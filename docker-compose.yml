services:
  postgres:
    image: postgres:15
    container_name: querysense_db
    environment:
      POSTGRES_USER: querysense
      POSTGRES_PASSWORD: querysense
      POSTGRES_DB: querysense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: querysense_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: